<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Glimpse – зеркало осознанности</title>
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            touch-action: manipulation;
        }
        #mirror-container {
            position: relative;
            width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        video, canvas {
            position: absolute;
            width: 100%; height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* зеркалим */
        }
        canvas {
            z-index: 5; /* выше видео, но ниже оверлеев */
        }
        video {
            z-index: 1;
        }
        /* Вспышка – текст (для немаскированных линз) */
        #flash-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.4rem;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 20px rgba(0,0,0,0.8);
            opacity: 0;
            transition: opacity 0.1s ease;
            pointer-events: none;
            white-space: nowrap;
            z-index: 10;
        }
        /* Кнопки после вспышки */
        .post-flash-actions {
            position: absolute;
            bottom: 80px;
            left: 0; right: 0;
            display: flex;
            justify-content: space-around;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            z-index: 20;
        }
        .post-flash-actions.show {
            opacity: 1;
            pointer-events: auto;
        }
        .action-btn {
            background: rgba(255,255,255,0.9);
            color: #111;
            border: none;
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 600;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        /* Статистика */
        .stats {
            position: absolute;
            top: 30px;
            left: 20px;
            color: white;
            font-size: 0.9rem;
            background: rgba(0,0,0,0.5);
            padding: 8px 14px;
            border-radius: 20px;
            z-index: 30;
            backdrop-filter: blur(10px);
        }
        /* Переключатель линз */
        .lens-switcher {
            position: absolute;
            bottom: 25px;
            left: 20px; right: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
            z-index: 30;
            flex-wrap: wrap;
        }
        .lens-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid transparent;
            padding: 12px 18px;
            border-radius: 30px;
            font-size: 0.9rem;
            backdrop-filter: blur(10px);
            font-weight: 500;
            transition: all 0.2s;
        }
        .lens-btn.active {
            background: rgba(255,255,255,0.9);
            color: #000;
            border-color: white;
        }
        /* Невидимая область для клика (имитация поднятия) */
        #lift-trigger {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 70%;
            z-index: 15;
        }
        .hidden-camera-warning {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 1.2rem;
            text-align: center;
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border-radius: 16px;
            z-index: 50;
        }
        /* Ползунок скорости */
        .speed-control {
            position: absolute;
            top: 80px;
            right: 20px;
            z-index: 40;
            background: rgba(0,0,0,0.6);
            padding: 10px 14px;
            border-radius: 20px;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 0.8rem;
        }
        .speed-control input {
            width: 120px;
        }
    </style>
</head>
<body>
    <div id="mirror-container">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="overlay-canvas"></canvas>
        <div id="flash-overlay"></div>
        <div class="stats" id="stats">🔍 0 | ✅ 0 | 📱 0</div>

        <!-- Ползунок длительности вспышки -->
        <div class="speed-control">
            <label for="flash-speed">⏱️ Вспышка (сек): <span id="speed-value">0.6</span></label>
            <input type="range" id="flash-speed" min="0.2" max="2.0" step="0.1" value="0.6">
        </div>

        <!-- Область касания = поднятие телефона -->
        <div id="lift-trigger"></div>

        <!-- Кнопки выбора после вспышки -->
        <div class="post-flash-actions" id="post-actions">
            <button class="action-btn" id="btn-accept">👌 Принято</button>
            <button class="action-btn" id="btn-unlock">📱 Разблокировка</button>
        </div>

        <!-- Выбор линзы -->
        <div class="lens-switcher">
            <button class="lens-btn active" data-lens="intention">✨ Намерение</button>
            <button class="lens-btn" data-lens="knowledge">📚 Знания</button>
            <button class="lens-btn" data-lens="anchor">❤️ Якорь</button>
            <button class="lens-btn" data-lens="masks">😊 Маски</button>
        </div>
    </div>

    <!-- Jeeliz FaceFilter -->
    <script src="https://cdn.jsdelivr.net/npm/jeeliz-facefilter@latest/dist/jeelizFaceFilter.js"></script>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('overlay-canvas');
        const ctx = canvas.getContext('2d');
        const flashOverlay = document.getElementById('flash-overlay');
        const postActions = document.getElementById('post-actions');
        const statsDiv = document.getElementById('stats');
        const lensButtons = document.querySelectorAll('.lens-btn');

        // Статистика
        let lifts = 0, accepts = 0, unlocks = 0;

        // Текущая линза
        let currentLens = 'intention';

        // Длительность вспышки в миллисекундах
        let flashDuration = 600;

        // Флаги и таймеры
        let flashTimer = null;
        let actionsTimer = null;
        let isFlashActive = false;

        // Для Jeeliz
        let faceFilterReady = false;
        const MASK_TYPES = ['glasses', 'mustache', 'bunny_ears', 'hat', 'clown_nose'];

        // Контент для текстовых линз
        const content = {
            intention: [
                "Я спокоен", "Я всё успеваю", "Мне хватает времени",
                "Я тот, кто действует", "Осанка", "Плечи расправлены",
                "Улыбнись", "Вдох – выдох"
            ],
            knowledge: [
                "Петрикор – запах земли после дождя",
                "Сатори – внезапное просветление",
                "Эвдемония – счастье как цель жизни",
                "Паросмия – искажение обоняния",
                "Квант – минимальная порция энергии"
            ],
            anchor: [
                "Подумай о маме", "Позвони другу", "Вспомни лучший момент",
                "Кого ты любишь?", "Кто в тебя верит?"
            ]
        };

        // Обновление статистики
        function updateStats() {
            statsDiv.textContent = `🔍 ${lifts} | ✅ ${accepts} | 📱 ${unlocks}`;
        }

        // Скрыть кнопки выбора
        function hideActions() {
            postActions.classList.remove('show');
            if (actionsTimer) clearTimeout(actionsTimer);
        }

        // Показать вспышку
        function triggerFlash() {
            if (flashTimer) return; // уже активна

            lifts++;
            updateStats();

            // Если активна линза масок — включаем отрисовку маски на время вспышки
            if (currentLens === 'masks') {
                if (!faceFilterReady) {
                    initFaceFilter();
                }
                isFlashActive = true;
                window._flashMaskType = null; // сброс, чтобы выбрать новую маску
                flashTimer = setTimeout(() => {
                    isFlashActive = false;
                    flashTimer = null;
                    postActions.classList.add('show');
                    actionsTimer = setTimeout(hideActions, 2500);
                }, flashDuration);
                return;
            }

            // Текстовые линзы
            const items = content[currentLens];
            if (items) {
                const text = items[Math.floor(Math.random() * items.length)];
                flashOverlay.textContent = text;
                flashOverlay.style.opacity = '1';
            }

            flashTimer = setTimeout(() => {
                flashOverlay.style.opacity = '0';
                flashTimer = null;
                postActions.classList.add('show');
                actionsTimer = setTimeout(hideActions, 2500);
            }, flashDuration);
        }

        // Обработчики кнопок после вспышки
        document.getElementById('btn-accept').addEventListener('click', (e) => {
            e.stopPropagation();
            accepts++;
            updateStats();
            hideActions();
        });
        document.getElementById('btn-unlock').addEventListener('click', (e) => {
            e.stopPropagation();
            unlocks++;
            updateStats();
            hideActions();
        });

        // Касание невидимой области — вызов вспышки
        document.getElementById('lift-trigger').addEventListener('click', triggerFlash);

        // Переключение линз
        lensButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                lensButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentLens = btn.dataset.lens;
                hideActions();
                // Если выбрали маски и трекер ещё не запущен — инициализируем
                if (currentLens === 'masks' && !faceFilterReady) {
                    initFaceFilter();
                }
            });
        });

        // Ползунок регулировки длительности вспышки
        const speedSlider = document.getElementById('flash-speed');
        const speedValue = document.getElementById('speed-value');
        speedSlider.addEventListener('input', (e) => {
            flashDuration = parseFloat(e.target.value) * 1000;
            speedValue.textContent = e.target.value;
        });

        // Инициализация Jeeliz FaceFilter и программная отрисовка масок
        function initFaceFilter() {
            if (faceFilterReady) return;
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;

            JeelizFaceFilter.init({
                canvas: canvas,
                video: video,
                callbackReady: function(errCode, spec) {
                    if (errCode) {
                        console.error('JeelizFaceFilter error:', errCode);
                        return;
                    }
                    faceFilterReady = true;
                    console.log('FaceFilter готов');
                },
                callbackTrack: function(detectState) {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    if (!isFlashActive || !detectState || MASK_TYPES.length === 0) {
                        window._flashMaskType = null;
                        return;
                    }

                    // Выбираем тип маски один раз за вспышку
                    if (!window._flashMaskType) {
                        window._flashMaskType = MASK_TYPES[Math.floor(Math.random() * MASK_TYPES.length)];
                    }
                    const maskType = window._flashMaskType;

                    const x = detectState.x;
                    const y = detectState.y;
                    const scale = detectState.scale;
                    const rz = detectState.rz; // поворот в плоскости экрана

                    ctx.save();
                    ctx.translate(x, y);
                    ctx.scale(-1, 1); // компенсируем зеркалирование canvas
                    ctx.rotate(-rz);
                    const s = scale * 0.8; // базовый масштаб

                    ctx.strokeStyle = 'rgba(0,0,0,0.8)';
                    ctx.fillStyle = 'rgba(0,0,0,0.7)';
                    ctx.lineWidth = 3 * s;

                    switch(maskType) {
                        case 'glasses':
                            const eyeOffsetX = 0.25 * s * canvas.width;
                            const eyeY = -0.1 * s * canvas.height;
                            const eyeRadius = 0.12 * s * canvas.width;
                            ctx.beginPath();
                            ctx.arc(-eyeOffsetX, eyeY, eyeRadius, 0, Math.PI*2);
                            ctx.stroke();
                            ctx.beginPath();
                            ctx.arc(eyeOffsetX, eyeY, eyeRadius, 0, Math.PI*2);
                            ctx.stroke();
                            ctx.beginPath();
                            ctx.moveTo(-eyeOffsetX - eyeRadius, eyeY);
                            ctx.lineTo(eyeOffsetX + eyeRadius, eyeY);
                            ctx.stroke();
                            break;
                        case 'mustache':
                            ctx.beginPath();
                            ctx.moveTo(-0.2 * s * canvas.width, 0.1 * s * canvas.height);
                            ctx.quadraticCurveTo(0, 0.25 * s * canvas.height, 0.2 * s * canvas.width, 0.1 * s * canvas.height);
                            ctx.stroke();
                            ctx.beginPath();
                            ctx.arc(-0.1 * s * canvas.width, 0.08 * s * canvas.height, 0.03 * s * canvas.width, 0, Math.PI);
                            ctx.stroke();
                            ctx.beginPath();
                            ctx.arc(0.1 * s * canvas.width, 0.08 * s * canvas.height, 0.03 * s * canvas.width, 0, Math.PI);
                            ctx.stroke();
                            break;
                        case 'bunny_ears':
                            ctx.save();
                            ctx.translate(0, -0.35 * s * canvas.height);
                            ctx.scale(1, 1.8);
                            ctx.beginPath();
                            ctx.ellipse(-0.15 * s * canvas.width, 0, 0.07 * s * canvas.width, 0.15 * s * canvas.height, 0, 0, Math.PI*2);
                            ctx.stroke();
                            ctx.beginPath();
                            ctx.ellipse(0.15 * s * canvas.width, 0, 0.07 * s * canvas.width, 0.15 * s * canvas.height, 0, 0, Math.PI*2);
                            ctx.stroke();
                            ctx.restore();
                            break;
                        case 'hat':
                            ctx.fillStyle = 'rgba(50,50,50,0.9)';
                            const hatWidth = 0.35 * s * canvas.width;
                            const hatHeight = 0.25 * s * canvas.height;
                            const hatY = -0.45 * s * canvas.height;
                            ctx.fillRect(-hatWidth/2, hatY, hatWidth, hatHeight);
                            ctx.fillRect(-hatWidth/2 - 10*s, hatY + hatHeight - 5*s, hatWidth + 20*s, 8*s);
                            break;
                        case 'clown_nose':
                            ctx.fillStyle = 'red';
                            ctx.beginPath();
                            ctx.arc(0, 0.05 * s * canvas.height, 0.08 * s * canvas.width, 0, Math.PI*2);
                            ctx.fill();
                            ctx.strokeStyle = 'black';
                            ctx.lineWidth = 2;
                            ctx.stroke();
                            break;
                    }
                    ctx.restore();
                }
            });
        }

        // Запуск камеры
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: { ideal: 720 }, height: { ideal: 1280 } },
                    audio: false
                });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                };
            } catch (err) {
                console.error(err);
                document.getElementById('mirror-container').innerHTML += 
                    '<div class="hidden-camera-warning">Не удалось получить доступ к камере. Разрешите камеру и обновите страницу.<br>Работает только по HTTPS или localhost.</div>';
            }
        }

        startCamera();

        // Service Worker (для PWA)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('SW registered'))
                    .catch(err => console.log('SW failed', err));
            });
        }
    </script>
</body>
</html>
